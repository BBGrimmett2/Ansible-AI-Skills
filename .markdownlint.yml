---
# Markdownlint configuration
default: true

# MD013 - Line length
# Disabled: Modern editors have soft-wrap, and technical documentation often contains
# long URLs, code examples, and technical terms that are more readable without forced
# line breaks. Enforcing line length creates awkward breaks and reduces readability.
MD013: false

# MD033 - Inline HTML
MD033:
  allowed_elements:
    - br
    - details
    - summary

# MD041 - First line in file should be a top level heading
MD041: false

# MD046 - Code block style
MD046:
  style: fenced
